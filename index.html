<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun! 🎂</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }

        /* Floating Elements */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .float-item {
            position: absolute;
            animation: float 20s infinite linear;
            opacity: 0.7;
        }

        .cake-float { font-size: 3rem; }
        .balloon-float { font-size: 2.5rem; }
        .star-float { font-size: 2rem; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        /* Main Container */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            padding: 2rem;
            text-align: center;
        }

        /* Hero Section */
        .hero {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 4rem 3rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 800px;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero p {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: white;
            margin-bottom: 2rem;
            font-weight: 300;
            line-height: 1.6;
        }

        /* Birthday Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }

        .stat-label {
            color: white;
            font-size: 1.1rem;
            margin-top: 0.5rem;
            font-weight: 400;
        }

        /* Interactive Button */
        .party-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
            background-size: 200% 200%;
            border: none;
            padding: 1.5rem 3rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(255,107,107,0.4);
            animation: pulse 2s infinite;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 15px 35px rgba(255,107,107,0.4); }
            50% { box-shadow: 0 15px 35px rgba(255,107,107,0.7); }
            100% { box-shadow: 0 15px 35px rgba(255,107,107,0.4); }
        }

        .party-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(255,107,107,0.6);
            animation: none;
        }

        .party-btn:active {
            transform: translateY(-2px);
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% {
                opacity: 1;
                transform: scale(1) translate(0, 0);
            }
            100% {
                opacity: 0;
                transform: scale(0) translate(var(--dx), var(--dy));
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            
            .stats {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Floating Elements -->
    <div class="floating-elements" id="floatingElements"></div>
    
    <!-- Particles Container -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="hero">
            <h1>🎉 SELAMAT ULANG TAHUN! 🎉</h1>
            <p>
                Hari spesialmu telah tiba! Semoga tahun ini penuh dengan <br>
                <strong>kebahagiaan, kesuksesan, dan kejutan indah! ✨</strong>
            </p>
            
            <div class="stats">
                <div class="stat-card" onclick="launchConfetti()">
                    <span class="stat-number">24</span>
                    <div class="stat-label">Tahun Penuh Cerita</div>
                </div>
                <div class="stat-card" onclick="launchConfetti()">
                    <span class="stat-number">365</span>
                    <div class="stat-label">Hari Bahagia Baru</div>
                </div>
                <div class="stat-card" onclick="launchConfetti()">
                    <span class="stat-number">∞</span>
                    <div class="stat-label">Doa Terbaik</div>
                </div>
            </div>
            
            <button class="party-btn" onclick="launchParty()">
                🎊 MULAI PAKAIAN 🎊
            </button>
        </div>
    </div>

    <script>
        // Create floating elements
        function createFloatingElements() {
            const elements = ['🎂', '🎈', '⭐', '🎁', '🎉', '✨', '🎊'];
            const container = document.getElementById('floatingElements');
            
            for (let i = 0; i < 15; i++) {
                const floatItem = document.createElement('div');
                floatItem.className = `float-item ${Math.random() > 0.5 ? 'cake-float' : Math.random() > 0.7 ? 'balloon-float' : 'star-float'}`;
                floatItem.innerHTML = elements[Math.floor(Math.random() * elements.length)];
                floatItem.style.left = Math.random() * 100 + '%';
                floatItem.style.animationDelay = Math.random() * 20 + 's';
                floatItem.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(floatItem);
            }
        }

        // Launch confetti particles
        function launchConfetti() {
            const particlesContainer = document.getElementById('particles');
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
                particle.style.setProperty('--dy', (Math.random() - 0.5) * 200 + 'px');
                particle.style.animationDelay = Math.random() * 0.3 + 's';
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // Party mode with multiple effects
        function launchParty() {
            // Multiple confetti bursts
            for (let i = 0; i < 5; i++) {
                setTimeout(() => launchConfetti(), i * 200);
            }
            
            // Screen shake
            document.body.style.animation = 'shake 0.5s ease-in-out';
            setTimeout(() => {
                document.body.style.animation = '';
            }, 500);
            
            // Fireworks sound effect (visual)
            createFireworks();
        }

        // Fireworks effect
        function createFireworks() {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    launchConfetti();
                    // Add burst effect
                    const burst = document.createElement('div');
                    burst.style.cssText = `
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        width: 20px;
                        height: 20px;
                        background: radial-gradient(circle, #ff6b6b, transparent);
                        border-radius: 50%;
                        transform: translate(-50%, -50%);
                        animation: burst 1s ease-out forwards;
                        z-index: 20;
                        pointer-events: none;
                    `;
                    document.body.appendChild(burst);
                    setTimeout(() => burst.remove(), 1000);
                }, i * 300);
            }
        }

        // Add shake animation
        const shakeKeyframes = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        const style = document.createElement('style');
        style.textContent = shakeKeyframes;
        document.head.appendChild(style);

        // Burst animation for fireworks
        const burstKeyframes = `
            @keyframes burst {
                0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(20); opacity: 0; }
            }
        `;
        style.textContent += burstKeyframes;

        // Initialize
        window.addEventListener('load', () => {
            createFloatingElements();
            
            // Auto confetti every 10 seconds
            setInterval(() => {
                if (Math.random() > 0.7) {
                    launchConfetti();
                }
            }, 10000);
        });

        // Mouse trail effect
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.95) {
                const sparkle = document.createElement('div');
                sparkle.style.cssText = `
                    position: fixed;
                    left: ${e.clientX}px;
                    top: ${e.clientY}px;
                    width: 6px;
                    height: 6px;
                    background: #fff;
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 100;
                    animation: sparkle 0.6s ease-out forwards;
                `;
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 600);
            }
        });

        const sparkleKeyframes = `
            @keyframes sparkle {
                0% { transform: scale(0) rotate(0deg); opacity: 1; }
                100% { transform: scale(1) rotate(180deg); opacity: 0; }
            }
        `;
        style.textContent += sparkleKeyframes;
    </script>
</body>
</html>
