Berikut adalah kode yang sudah diubah dengan **animasi tulis tangan yang jauh lebih menarik** menggunakan efek typewriter + handwriting realistis dengan bounce, glow, dan particle effect:

```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik </title>

<!-- FONT GOOGLE POPPINS + HANDWRITING -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    position: relative;
}

/* FOTO BACKGROUND ANDA */
.bg-image {
    background-image: url('5ea4d25c-04a4-48ae-ab60-e65c001a4e59.JPG');
    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    position: fixed;
    width: 100%;
    z-index: -2;
    filter: blur(2px);
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* CONTENT */
.content-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
    padding: 20px;
}

/* JUDUL HAPPY BIRTHDAY - STATIC */
h1.title {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,255,255,0.9);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeInDown 1s ease 0.3s forwards;
}

@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ✨ NAMA - HANDWRITING ULTRA REALISTIS ✨ */
.name {
    font-size: clamp(3rem, 9vw, 5.5rem) !important;
    font-family: 'Great Vibes', 'Dancing Script', cursive !important;
    font-weight: 400 !important;
    color: #fff !important;
    text-shadow: 
        0 0 20px rgba(255,255,255,0.9),
        0 0 30px rgba(103,126,234,0.6),
        0 0 40px rgba(255,182,193,0.4);
    margin: 0.5rem 0 1.5rem 0 !important;
    overflow: hidden;
    white-space: nowrap;
    width: 0;
    position: relative;
    
    /* ✨ MAGIC LINE ANIMATION ✨ */
    background: linear-gradient(90deg, transparent 0%, #fff 50%, transparent 100%);
    background-size: 200% 100%;
    background-position: 100%;
    background-repeat: no-repeat;
    animation: 
        magicWrite 3.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.3s forwards,
        glowPulse 2s ease-in-out 4.5s infinite;
}

@keyframes magicWrite {
    0% { 
        width: 0; 
        background-position: 100% 0;
    }
    50% { 
        width: 60%; 
        background-position: 0 0;
        filter: drop-shadow(0 0 20px rgba(255,255,255,0.8));
    }
    100% { 
        width: 100%; 
        background-position: -100% 0;
        filter: drop-shadow(0 0 30px rgba(255,182,193,0.6));
    }
}

@keyframes glowPulse {
    0%, 100% { 
        text-shadow: 
            0 0 20px rgba(255,255,255,0.9),
            0 0 30px rgba(103,126,234,0.6),
            0 0 40px rgba(255,182,193,0.4);
        transform: scale(1);
    }
    50% { 
        text-shadow: 
            0 0 30px rgba(255,255,255,1),
            0 0 50px rgba(103,126,234,0.8),
            0 0 60px rgba(255,182,193,0.7);
        transform: scale(1.03);
    }
}

/* ✨ TYPEWRITER CURSOR ULTRA SMOOTH ✨ */
.name::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(to bottom, #fff, #ff6b9d);
    animation: 
        typewriterBlink 0.8s infinite 4.5s,
        cursorBounce 2s ease-in-out infinite 4.5s;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
}

@keyframes typewriterBlink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
}

@keyframes cursorBounce {
    0%, 100% { transform: translateY(0px) scaleY(1); }
    25% { transform: translateY(-2px) scaleY(1.2); }
    75% { transform: translateY(1px) scaleY(0.9); }
}

/* ✨ WRITING PARTICLES ✨ */
.name::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    background-image: 
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 1px, transparent 1px),
        radial-gradient(circle at 80% 80%, rgba(255,107,157,0.8) 1px, transparent 1px);
    background-size: 30px 30px, 40px 40px;
    animation: particleFloat 4s linear infinite 1.3s;
    opacity: 0;
    animation-fill-mode: forwards;
}

@keyframes particleFloat {
    0% { opacity: 0; transform: translateX(-100%) translateY(20px); }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateX(100%) translateY(-20px); }
}

/* LETTER BY LETTER BOUNCE */
.name span {
    display: inline-block;
    opacity: 0;
    transform: translateY(30px) scale(0.8);
    animation: letterBounce 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
}

.name span:nth-child(1) { animation-delay: 1.5s; }
.name span:nth-child(2) { animation-delay: 1.6s; }
.name span:nth-child(3) { animation-delay: 1.7s; }
.name span:nth-child(4) { animation-delay: 1.8s; }
.name span:nth-child(5) { animation-delay: 1.9s; }
.name span:nth-child(6) { animation-delay: 2.0s; }
.name span:nth-child(7) { animation-delay: 2.1s; }
.name span:nth-child(8) { animation-delay: 2.2s; }
.name span:nth-child(9) { animation-delay: 2.3s; }
.name span:nth-child(10) { animation-delay: 2.4s; }
.name span:nth-child(11) { animation-delay: 2.5s; }
.name span:nth-child(12) { animation-delay: 2.6s; }
.name span:nth-child(13) { animation-delay: 2.7s; }
.name span:nth-child(14) { animation-delay: 2.8s; }
.name span:nth-child(15) { animation-delay: 2.9s; }
.name span:nth-child(16) { animation-delay: 3.0s; }
.name span:nth-child(17) { animation-delay: 3.1s; }

@keyframes letterBounce {
    0% { 
        opacity: 0; 
        transform: translateY(30px) scale(0.8) rotate(-5deg); 
    }
    60% { 
        opacity: 1; 
        transform: translateY(-10px) scale(1.1) rotate(2deg); 
    }
    100% { 
        opacity: 1; 
        transform: translateY(0) scale(1) rotate(0deg); 
    }
}

/* MESSAGE CONTAINER - LEBIH RAPAT */
.message-container {
    max-width: 600px;
    margin: 0 auto;
}

.message-title {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeInUp 1s ease 5s forwards;
    line-height: 1.2;
}

.message-text {
    font-size: clamp(1rem, 2.8vw, 1.3rem);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeInUp 1s ease 5.2s forwards;
    font-weight: 300;
    line-height: 1.4;
}

.message-text br {
    margin-bottom: 0.4em;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 🎂 CAKE BUTTON - PRESISI ULTRA */
.cake-container {
    position: relative;
    width: 180px;
    height: 120px;
    margin: 2rem auto;
}

.cake-slice {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 25px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(5rem, 14vw, 7rem);
    font-weight: bold;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    opacity: 0;
    transform: scale(0.8) rotateY(-90deg);
    animation: cakeSliceAppear 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 6.5s forwards;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 3;
}

.cake-slice-1 {
    background: 
        radial-gradient(ellipse at top, #ff6b9d 0%, #ff8fab 40%, #ffb3c6 70%, transparent 100%),
        linear-gradient(145deg, #ff99cc 0%, #ff69b4 50%, #ff1493 100%);
    box-shadow: 
        0 12px 30px rgba(255,107,157,0.6),
        0 0 40px rgba(255,182,193,0.8),
        inset 0 2px 10px rgba(255,255,255,0.4),
        inset 0 -2px 8px rgba(255,20,147,0.3);
    clip-path: polygon(0% 0%, 100% 0%, 100% 20%, 80% 40%, 100% 60%, 100% 100%, 0% 100%);
}

.cake-slice-2 {
    background: 
        radial-gradient(ellipse at top, #ff1493 0%, #ff69b4 40%, #ff99cc 70%, transparent 100%),
        linear-gradient(145deg, #ff69b4 0%, #ff1493 50%, #ff6b9d 100%);
    box-shadow: 
        0 12px 30px rgba(255,20,147,0.6),
        0 0 40px rgba(255,105,180,0.8),
        inset 0 2px 10px rgba(255,255,255,0.4),
        inset 0 -2px 8px rgba(255,107,157,0.3);
    clip-path: polygon(20% 0%, 100% 0%, 100% 40%, 60% 60%, 100% 80%, 100% 100%, 0% 100%, 0% 20%);
    animation-delay: 6.6s;
    z-index: 2;
}

.cake-slice-3 {
    background: 
        radial-gradient(ellipse at top, #ffb3c6 0%, #ff8fab 40%, #ff6b9d 70%, transparent 100%),
        linear-gradient(145deg, #ffb3c6 0%, #ff8fab 50%, #ff69b4 100%);
    box-shadow: 
        0 12px 30px rgba(255,182,193,0.6),
        0 0 40px rgba(255,139,205,0.8),
        inset 0 2px 10px rgba(255,255,255,0.4),
        inset 0 -2px 8px rgba(255,105,180,0.3);
    clip-path: polygon(0% 0%, 80% 0%, 100% 20%, 100% 100%, 0% 100%);
    animation-delay: 6.7s;
    z-index: 1;
}

@keyframes cakeSliceAppear {
    0% { 
        opacity: 0; 
        transform: scale(0.6) rotateY(-90deg) translateZ(0); 
    }
    50% { 
        opacity: 0.7; 
        transform: scale(1.05) rotateY(10deg) translateZ(20px); 
    }
    100% { 
        opacity: 1; 
        transform: scale(1) rotateY(0deg) translateZ(0); 
    }
}

.cake-slice:hover {
    transform: scale(1.12) translateY(-12px) rotateX(5deg) rotateY(-3deg) !important;
    box-shadow: 
        0 25px 50px rgba(255,107,157,0.8),
        0 0 60px rgba(255,182,193,1),
        inset 0 4px 15px rgba(255,255,255,0.6),
        inset 0 -3px 12px rgba(255,20,147,0.4);
    z-index: 10;
}

.cake-slice::before {
    content: '✨';
    position: absolute;
    top: 10%;
    right: 15%;
    font-size: 1.2rem;
    opacity: 0;
    animation: sparkleFloat 2s ease-in-out infinite 0.5s;
    z-index: 5;
    pointer-events: none;
}

.cake-slice:hover::before {
    opacity: 1;
    animation-play-state: running;
}

@keyframes sparkleFloat {
    0%, 100% { transform: translateY(0px) scale(1); opacity: 0.8; }
    50% { transform: translateY(-10px) scale(1.2); opacity: 1; }
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 65px;
    height: 65px;
    font-size: 1.6rem;
    color: white;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: slideInRight 0.8s 0.8s forwards;
}

@keyframes slideInRight {
    to { opacity: 1; transform: translateX(0); }
}

.music-btn:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.4);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .content-container { padding: 15px; }
    .name { letter-spacing: 0 !important; margin-bottom: 1rem !important; }
    .message-title { margin-bottom: 0.6rem; }
    .message-text { margin-bottom: 1.5rem; line-height: 1.3; }
    .cake-container { width: 160px; height: 100px; margin: 1.5rem auto; }
    .cake-slice { font-size: clamp(4.5rem, 13vw, 6rem); }
    .music-btn { top: 15px; right: 15px; width: 55px; height: 55px; }
}
</style>
</head>
