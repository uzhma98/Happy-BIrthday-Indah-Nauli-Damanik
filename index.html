<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik </title>

<!-- FONT GOOGLE POPPINS + HANDWRITING -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    position: relative;
}

/* FOTO BACKGROUND ANDA */
.bg-image {
    background-image: url('bg.jpg');
    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    position: fixed;
    width: 100%;
    z-index: -2;
    filter: blur(2px);
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* CONTENT */
.content-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
    padding: 20px;
}

/* JUDUL HAPPY BIRTHDAY - STATIC */
h1.title {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,255,255,0.9);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeInDown 1s ease 0.3s forwards;
}

@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* NAMA - HANDWRITING CEPAT (2.5s) */
.name {
    font-size: clamp(3rem, 9vw, 5.5rem) !important;
    font-family: 'Dancing Script', cursive !important;
    font-weight: 700 !important;
    color: #fff !important;
    text-shadow: 
        0 0 20px rgba(255,255,255,0.9),
        0 0 30px rgba(103,126,234,0.6);
    margin: 0.5rem 0 1.5rem 0 !important;
    overflow: hidden;
    white-space: nowrap;
    border-right: 4px solid rgba(255,255,255,0.9);
    width: 0;
    animation: handwriting 2.5s steps(20) 1.3s forwards, blink 0.75s infinite 3.8s;
}

@keyframes handwriting {
    from { width: 0; }
    to { width: 100%; }
}

@keyframes blink {
    0%, 50% { border-color: rgba(255,255,255,0.9); }
    51%, 100% { border-color: transparent; }
}

/* MESSAGE CONTAINER - LEBIH RAPAT */
.message-container {
    max-width: 600px;
    margin: 0 auto;
}

.message-title {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeInUp 1s ease 4.3s forwards;
    line-height: 1.2;
}

.message-text {
    font-size: clamp(1rem, 2.8vw, 1.3rem);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeInUp 1s ease 4.5s forwards;
    font-weight: 300;
    line-height: 1.4;
}

.message-text br {
    margin-bottom: 0.4em;
}

/* 🎂 CAKE BUTTON - PRESISI ULTRA */
.cake-container {
    position: relative;
    width: 180px;
    height: 120px;
    margin: 0 auto;
}

.cake-slice {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 25px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(5rem, 14vw, 7rem);
    font-weight: bold;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    opacity: 0;
    transform: scale(0.8) rotateY(-90deg);
    animation: cakeSliceAppear 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 5.3s forwards;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 3;
}

.cake-slice-1 {
    background: 
        radial-gradient(ellipse at top, #ff6b9d 0%, #ff8fab 40%, #ffb3c6 70%, transparent 100%),
        linear-gradient(145deg, #ff99cc 0%, #ff69b4 50%, #ff1493 100%);
    box-shadow: 
        0 12px 30px rgba(255,107,157,0.6),
        0 0 40px rgba(255,182,193,0.8),
        inset 0 2px 10px rgba(255,255,255,0.4),
        inset 0 -2px 8px rgba(255,20,147,0.3);
    clip-path: polygon(0% 0%, 100% 0%, 100% 20%, 80% 40%, 100% 60%, 100% 100%, 0% 100%);
}

.cake-slice-2 {
    background: 
        radial-gradient(ellipse at top, #ff1493 0%, #ff69b4 40%, #ff99cc 70%, transparent 100%),
        linear-gradient(145deg, #ff69b4 0%, #ff1493 50%, #ff6b9d 100%);
    box-shadow: 
        0 12px 30px rgba(255,20,147,0.6),
        0 0 40px rgba(255,105,180,0.8),
        inset 0 2px 10px rgba(255,255,255,0.4),
        inset 0 -2px 8px rgba(255,107,157,0.3);
    clip-path: polygon(20% 0%, 100% 0%, 100% 40%, 60% 60%, 100% 80%, 100% 100%, 0% 100%, 0% 20%);
    animation-delay: 5.4s;
    z-index: 2;
}

.cake-slice-3 {
    background: 
        radial-gradient(ellipse at top, #ffb3c6 0%, #ff8fab 40%, #ff6b9d 70%, transparent 100%),
        linear-gradient(145deg, #ffb3c6 0%, #ff8fab 50%, #ff69b4 100%);
    box-shadow: 
        0 12px 30px rgba(255,182,193,0.6),
        0 0 40px rgba(255,139,205,0.8),
        inset 0 2px 10px rgba(255,255,255,0.4),
        inset 0 -2px 8px rgba(255,105,180,0.3);
    clip-path: polygon(0% 0%, 80% 0%, 100% 20%, 100% 100%, 0% 100%);
    animation-delay: 5.5s;
    z-index: 1;
}

/* Animasi muncul slice by slice */
@keyframes cakeSliceAppear {
    0% { 
        opacity: 0; 
        transform: scale(0.6) rotateY(-90deg) translateZ(0); 
    }
    50% { 
        opacity: 0.7; 
        transform: scale(1.05) rotateY(10deg) translateZ(20px); 
    }
    100% { 
        opacity: 1; 
        transform: scale(1) rotateY(0deg) translateZ(0); 
    }
}

/* Floating presisi */
@keyframes cakeFloatPrecise {
    0%, 100% { 
        transform: translateY(0px) rotateX(0deg) rotateY(0deg); 
    }
    25% { 
        transform: translateY(-4px) rotateX(2deg) rotateY(-1deg); 
    }
    50% { 
        transform: translateY(-8px) rotateX(0deg) rotateY(2deg); 
    }
    75% { 
        transform: translateY(-4px) rotateX(-1deg) rotateY(1deg); 
    }
}

.cake-slice:hover {
    transform: scale(1.12) translateY(-12px) rotateX(5deg) rotateY(-3deg) !important;
    box-shadow: 
        0 25px 50px rgba(255,107,157,0.8),
        0 0 60px rgba(255,182,193,1),
        inset 0 4px 15px rgba(255,255,255,0.6),
        inset 0 -3px 12px rgba(255,20,147,0.4);
    z-index: 10;
}

.cake-slice:active {
    transform: scale(1.05) translateY(-8px) rotateX(0deg) !important;
}

/* Hover sparkle effect */
.cake-slice::before {
    content: '✨';
    position: absolute;
    top: 10%;
    right: 15%;
    font-size: 1.2rem;
    opacity: 0;
    animation: sparkleFloat 2s ease-in-out infinite 0.5s;
    z-index: 5;
    pointer-events: none;
}

.cake-slice:hover::before {
    opacity: 1;
    animation-play-state: running;
}

@keyframes sparkleFloat {
    0%, 100% { transform: translateY(0px) scale(1); opacity: 0.8; }
    50% { transform: translateY(-10px) scale(1.2); opacity: 1; }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 65px;
    height: 65px;
    font-size: 1.6rem;
    color: white;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: slideInRight 0.8s 0.8s forwards;
}

@keyframes slideInRight {
    to { opacity: 1; transform: translateX(0); }
}

.music-btn:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.4);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .content-container { padding: 15px; }
    .name { letter-spacing: 0 !important; margin-bottom: 1rem !important; }
    .message-title { margin-bottom: 0.6rem; }
    .message-text { margin-bottom: 1.5rem; line-height: 1.3; }
    .cake-container { width: 160px; height: 100px; }
    .cake-slice { font-size: clamp(4.5rem, 13vw, 6rem); }
    .music-btn { top: 15px; right: 15px; width: 55px; height: 55px; }
}
</style>
</head>

<body>
<!-- BACKGROUND FOTO -->
<div class="bg-image"></div>
<div class="overlay"></div>

<!-- MUSIC BUTTON -->
<button class="music-btn" id="musicBtn">🎵</button>

<!-- CONTENT -->
<div class="content-container">
    <h1 class="title">🎉Happy Birthday🎉</h1>
    <h1 class="name">Indah Nauli Damanik</h1>
    
    <!-- MESSAGE RAPiH - VERSI LEBIH RAPAT -->
    <div class="message-container">
        <div class="message-title">Selamat ulang tahun ya! 🎉</div>
        <div class="message-text">
            Makasih sudah sabar dan selalu ada di samping aku.<br>
            Yang penting kamu sehat dan bahagia terus.<br>
            <strong>I'm so lucky to have you ✨</strong>
        </div>
        <!-- 🎂 KUE 3D PRESISI -->
        <div class="cake-container" onclick="celebrate()">
            <div class="cake-slice cake-slice-1">🎂</div>
            <div class="cake-slice cake-slice-2">🎂</div>
            <div class="cake-slice cake-slice-3">🎂</div>
        </div>
        <p style="font-size: 0.9rem; opacity: 0; animation: fadeInUp 1s 6.1s forwards;">Klik 🎂 untuk rayakan! 🎉</p>
    </div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop preload="auto">
    <source src="mp3.mp3">
</audio>

<!-- CONFETTI CDN -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// 🎵 MUSIC CONTROL
let isPlaying = false;
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');

function toggleMusic() {
    if (isPlaying) {
        bgMusic.pause();
        musicBtn.innerHTML = '🔇';
        isPlaying = false;
    } else {
        bgMusic.play().catch(() => {});
        musicBtn.innerHTML = '🎵';
        isPlaying = true;
    }
}

// 🎉 CELEBRATE FUNCTION
function celebrate() {
    // Play music
    if (!isPlaying) {
        bgMusic.play().catch(() => {});
        musicBtn.innerHTML = '💥';
        isPlaying = true;
    }

    // 🎊 Confetti Explosion 1
    confetti({
        particleCount: 250,
        spread: 120,
        origin: { y: 0.6 }
    });

    // 🎊 Confetti dari kiri & kanan
    setTimeout(() => {
        confetti({
            particleCount: 200,
            angle: 60,
            spread: 90,
            origin: { x: 0, y: 0.4 }
        });
        confetti({
            particleCount: 200,
            angle: 120,
            spread: 90,
            origin: { x: 1, y: 0.4 }
        });
    }, 400);

    // 🎊 Final burst + heart
    setTimeout(() => {
        confetti({
            particleCount: 300,
            spread: 180,
            origin: { y: 0.2 }
        });
        // Heart confetti
        setTimeout(() => {
            for(let i = 0; i < 10; i++) {
                setTimeout(() => {
                    confetti({
                        particleCount: 5,
                        angle: 90 + i*10,
                        spread: 20,
                        origin: { x: 0.5, y: 0.5 },
                        colors: ['#ff6b9d', '#ff8fab', '#ffb3c6']
                    });
                }, i * 200);
            }
        }, 200);
    }, 1200);

    // Cake slices explode presisi
    const slices = document.querySelectorAll('.cake-slice');
    slices.forEach((slice, index) => {
        setTimeout(() => {
            slice.style.animation = 'cakeSliceExplode 1s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
        }, index * 100);
    });
}

// Cake slice explode animation
const explodeStyle = document.createElement('style');
explodeStyle.textContent = `
    @keyframes cakeSliceExplode {
        0% { 
            transform: scale(1) rotateY(0deg); 
        }
        40% { 
            transform: scale(1.3) rotateY(180deg) rotateZ(360deg); 
        }
        100% { 
            transform: scale(0) rotateY(720deg) rotateZ(1080deg) translateY(-100px); 
            opacity: 0;
        }
    }
`;
document.head.appendChild(explodeStyle);

// Auto play setelah user interaction
document.addEventListener('click', function handleFirstClick() {
    if (!isPlaying) {
        bgMusic.play().catch(e => console.log('Audio ready'));
    }
    document.removeEventListener('click', handleFirstClick);
}, { once: true });
</script>

</body>
</html>
