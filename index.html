<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik 💙</title>

<!-- FONT GOOGLE POPPINS (Lebih cocok untuk birthday) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}

body, html {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    position: relative;
}

/* BACKGROUND GRADIENT + PHOTO FALLBACK */
.bg-image {
    /* GUNAKAN GRADIENT SEBAGAI FALLBACK */
    background: linear-gradient(-45deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    
    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    position: fixed;
    width: 100%;
    z-index: -2;
}

/* KALAU MAU PAKAI FOTO, UPLOAD KE CDN DAN GANTI INI */
/*
.bg-image {
    background-image: url('https://your-image-url-here.jpg');
}
*/

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* PHOTO OVERLAY (opsional) */
.photo-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* CONTENT */
.content-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
    padding: 20px;
}

/* JUDUL */
h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
    margin-bottom: 1rem;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { 
        text-shadow: 
            0 0 20px rgba(255,255,255,0.8),
            0 0 30px rgba(255,255,255,0.6),
            0 0 40px rgba(120, 119, 198, 0.5);
    }
    to { 
        text-shadow: 
            0 0 30px rgba(255,255,255,1),
            0 0 40px rgba(255,255,255,0.8),
            0 0 50px rgba(120, 119, 198, 0.8);
    }
}

/* NAMA */
.name {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 600;
    color: #fff;
    text-shadow: 0 0 15px rgba(255,255,255,0.9);
    margin-bottom: 2rem;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
}

/* SUBTEXT */
.subtitle {
    font-size: clamp(1rem, 3vw, 1.5rem);
    margin-bottom: 3rem;
    opacity: 0.9;
    font-weight: 300;
    animation: fadeInUp 1s ease 0.5s both;
}

/* BUTTON KUE */
.cake-btn {
    font-size: clamp(4rem, 12vw, 6rem);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 3px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    width: 150px;
    height: 150px;
    cursor: pointer;
    animation: pulse 2s infinite;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.cake-btn:hover {
    transform: scale(1.2) rotate(10deg);
    background: rgba(255,255,255,0.4);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    animation: none;
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 1.5rem;
    color: white;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s ease;
}

.music-btn:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.4);
}

/* ANIMASI */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .content-container {
        padding: 10px;
    }
    
    h1 {
        letter-spacing: 2px;
    }
}
</style>
</head>

<body>
<!-- BACKGROUND -->
<div class="">5ea4d25c-04a4-48ae-ab60-e65c001a4e59.JPG</div>
<div class="photo-overlay"></div>

<!-- MUSIC BUTTON -->
<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<!-- CONTENT -->
<div class="content-container">
    <h1>Happy Birthday</h1>
    <h1 class="name">Indah Nauli Damanik 💙</h1>
    <p class="subtitle">Semoga hari spesialmu penuh kebahagiaan! ✨</p>
    <button class="cake-btn" onclick="celebrate()">🎂</button>
</div>

<!-- MUSIK (Audio gratis dari CDN) -->
<audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    <!-- Fallback audio data (beep sound) -->
    <source src="mp3.mp3">
</audio>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// MUSIC CONTROL
let isPlaying = false;
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');

function toggleMusic() {
    if (isPlaying) {
        bgMusic.pause();
        musicBtn.textContent = '🔇';
        isPlaying = false;
    } else {
        bgMusic.play();
        musicBtn.textContent = '🎵';
        isPlaying = true;
    }
}

// CELEBRATE FUNCTION
function celebrate() {
    // Play music jika belum
    if (!isPlaying) {
        bgMusic.play();
        musicBtn.textContent = '🎵';
        isPlaying = true;
    }

    // Multiple confetti bursts
    for (let i = 0; i < 5; i++) {
        setTimeout(() => {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }, i * 300);
    }

    // Tambahan confetti dari berbagai arah
    setTimeout(() => {
        confetti({
            particleCount: 200,
            angle: 60,
            spread: 55,
            origin: { x: 0 }
        });
        confetti({
            particleCount: 200,
            angle: 120,
            spread: 55,
            origin: { x: 1 }
        });
    }, 1500);

    // Shake effect pada cake button
    const cakeBtn = document.querySelector('.cake-btn');
    cakeBtn.style.animation = 'shake 0.5s';
}

// Shake animation
const style = document.createElement('style');
style.textContent = `
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }
`;
document.head.appendChild(style);

// Auto play music setelah user interaction
document.addEventListener('click', function handleFirstClick() {
    if (!isPlaying) {
        bgMusic.play().catch(e => console.log('Audio autoplay blocked'));
    }
    document.removeEventListener('click', handleFirstClick);
}, { once: true });
</script>

</body>
</html>
