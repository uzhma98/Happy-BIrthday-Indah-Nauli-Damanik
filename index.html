<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Indah Nauli Damanik</title>
    
    <link href="https://iosevka-webfonts.github.io/iosevka/iosevka.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Iosevka Web', monospace;
            overflow: hidden;
            background-color: #0f172a; /* Warna cadangan jika foto gagal muat */
        }

        /* BACKGROUND FOTO */
        .bg-image {
            /* PASTIKAN NAMA FILE INI SAMA PERSIS DI GITHUB (Besar/Kecil Hurufnya) */
            background-image: url('5ea4d25c-04a4-48ae-ab60-e65c001a4e59.JPG');
            
            height: 100vh;
            width: 100vw;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(4px) brightness(0.5); /* Blur & Gelap agar teks terbaca jelas */
            transform: scale(1.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        .content-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: white;
            padding: 20px;
        }

        /* EFEK MENGETIK */
        .typing {
            font-size: clamp(32px, 8vw, 70px);
            letter-spacing: 5px;
            text-transform: uppercase;
            overflow: hidden;
            border-right: 3px solid white;
            white-space: nowrap;
            width: 0;
            animation: typing 3s steps(30) forwards, blink 0.7s infinite;
            margin-bottom: 10px;
        }

        /* NAMA DENGAN GLOW */
        .name {
            font-size: clamp(28px, 6vw, 55px);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 2s ease forwards;
            animation-delay: 3s; /* Muncul setelah Happy Birthday selesai mengetik */
            
            text-shadow: 
                0 0 10px #38bdf8,
                0 0 20px #38bdf8,
                0 0 40px #0ea5e9;
        }

        /* TOMBOL KUE */
        .cake-btn {
            margin-top: 50px;
            font-size: 5rem;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
            animation-delay: 5s; /* Muncul paling terakhir */
            transition: transform 0.3s;
        }

        .cake-btn:hover {
            transform: scale(1.2);
        }

        .pulse {
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* ANIMASI KEYFRAMES */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="content-container">
        <div style="display: inline-block;">
            <h1 class="typing">Happy Birthday </h1>
        </div>
        
        <h1 class="name">Indah Nauli Damanik ❤️</h1>

        <button class="cake-btn pulse" onclick="celebrate()">🎂</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="mp3.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
