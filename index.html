<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik - Party Time! 🎉</title>

<!-- FONT GOOGLE POPPINS + HANDWRITING -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    position: relative;
}

/* BACKGROUND ANIMASI PARTY */
.bg-image {
    background: linear-gradient(45deg, #ff6b9d, #4ecdc4, #45b7d1, #f9ca24, #f0932b, #eb4d4b);
    background-size: 400% 400%;
    height: 100vh;
    position: fixed;
    width: 100%;
    z-index: -2;
    animation: gradientShift 8s ease infinite;
    filter: blur(1px);
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* FLOATING BALLOONS */
.balloon {
    position: fixed;
    font-size: clamp(2rem, 6vw, 4rem);
    animation: floatUp 12s linear infinite;
    z-index: 1;
    cursor: pointer;
    transition: all 0.3s ease;
}

.balloon:hover {
    transform: scale(1.2) !important;
    filter: drop-shadow(0 0 20px currentColor);
}

.balloon:nth-child(1) { left: 10%; animation-delay: 0s; color: #ff6b9d; }
.balloon:nth-child(2) { left: 20%; animation-delay: 2s; color: #4ecdc4; }
.balloon:nth-child(3) { right: 15%; animation-delay: 4s; color: #45b7d1; }
.balloon:nth-child(4) { right: 25%; animation-delay: 6s; color: #f9ca24; }
.balloon:nth-child(5) { left: 30%; animation-delay: 1s; color: #f0932b; }
.balloon:nth-child(6) { right: 35%; animation-delay: 3s; color: #eb4d4b; }

@keyframes floatUp {
    0% {
        bottom: -20%;
        transform: translateX(0) rotate(0deg);
    }
    25% {
        transform: translateX(50px) rotate(10deg);
    }
    50% {
        transform: translateX(-30px) rotate(-5deg);
    }
    75% {
        transform: translateX(20px) rotate(8deg);
    }
    100% {
        bottom: 120%;
        transform: translateX(-40px) rotate(0deg);
    }
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}

/* CONTENT */
.content-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
    padding: 20px;
}

/* 🎊 SPARKLE EFFECT */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkleTwinkle 2s linear infinite;
}

@keyframes sparkleTwinkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
}

/* PARTY BUTTONS */
.party-buttons {
    display: flex;
    gap: 15px;
    margin: 20px 0;
    flex-wrap: wrap;
    justify-content: center;
}

.btn-party {
    padding: 12px 24px;
    border: none;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
}

.btn-party::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: left 0.5s;
}

.btn-party:hover::before {
    left: 100%;
}

.btn-party:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.btn-dance { background: linear-gradient(45deg, #ff6b9d, #ff8fab); }
.btn-fireworks { background: linear-gradient(45deg, #4ecdc4, #44a08d); }
.btn-gifts { background: linear-gradient(45deg, #f9ca24, #f0932b); }
.btn-party-mode { background: linear-gradient(45deg, #eb4d4b, #e74c3c); }

/* DANCE FLOOR */
.dance-floor {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 200px;
    background: linear-gradient(90deg, 
        #ff6b9d 0%, #4ecdc4 25%, #45b7d1 50%, 
        #f9ca24 75%, #f0932b 100%);
    background-size: 200% 200%;
    z-index: 2;
    opacity: 0;
    animation: danceFloorGlow 2s ease forwards;
}

@keyframes danceFloorGlow {
    to { opacity: 0.8; }
}

.dance-floor::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    animation: discoSweep 1.5s linear infinite;
}

@keyframes discoSweep {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

/* GIFT BOXES */
.gift-box {
    position: absolute;
    width: 80px;
    height: 80px;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
}

.gift-box:hover {
    transform: scale(1.1) rotate(5deg);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

.gift-box.open {
    animation: giftExplode 1s ease forwards;
}

@keyframes giftExplode {
    0% { transform: scale(1) rotate(0deg); }
    30% { transform: scale(1.3) rotate(180deg); }
    100% { transform: scale(0) rotate(720deg); opacity: 0; }
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .party-buttons { flex-direction: column; align-items: center; }
    .btn-party { width: 200px; }
    .dance-floor { height: 150px; }
}
</style>
</head>

<body>
<!-- BACKGROUND -->
<div class="bg-image"></div>
<div class="overlay"></div>

<!-- 🎈 BALLOONS -->
<div class="balloon" onclick="popBalloon(this)">🎈</div>
<div class="balloon" onclick="popBalloon(this)">🎈</div>
<div class="balloon" onclick="popBalloon(this)">🎈</div>
<div class="balloon" onclick="popBalloon(this)">🎈</div>
<div class="balloon" onclick="popBalloon(this)">🎈</div>
<div class="balloon" onclick="popBalloon(this)">🎈</div>

<!-- DANCE FLOOR -->
<div class="dance-floor" id="danceFloor"></div>

<!-- CONTENT -->
<div class="content-container">
    <h1 class="title" style="animation: bounceIn 1.5s ease 0.5s forwards; font-size: clamp(3rem, 8vw, 6rem);">
        🎉 PARTY TIME! 🎉
    </h1>
    
    <div class="message-container" style="max-width: 700px; margin: 2rem 0;">
        <h2 style="font-size: clamp(1.8rem, 5vw, 3rem); font-family: 'Dancing Script', cursive; margin-bottom: 1rem;">
            Indah Nauli Damanik
        </h2>
        <p style="font-size: clamp(1.2rem, 3.5vw, 1.8rem); font-weight: 300; line-height: 1.6; margin-bottom: 2rem;">
            Selamat ulang tahun kece! 🎂<br>
            Mari rayakan momen spesialmu dengan penuh keceriaan! ✨
        </p>
    </div>

    <!-- 🎊 PARTY BUTTONS -->
    <div class="party-buttons">
        <button class="btn-party btn-dance" onclick="startDanceParty()">💃 Dance Party</button>
        <button class="btn-party btn-fireworks" onclick="fireworksShow()">🎆 Fireworks</button>
        <button class="btn-party btn-gifts" onclick="openGifts()">🎁 Open Gifts</button>
        <button class="btn-party btn-party-mode" onclick="ultimateParty()">🎉 Party Mode</button>
    </div>

    <p style="font-size: 1.1rem; margin-top: 2rem; opacity: 0.9;">
        Klik balon untuk meledak! 🎈 | Hover untuk efek spesial ✨
    </p>
</div>

<!-- CONFETTI CDN -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// 🔥 ULTIMATE PARTY FUNCTIONS

// Pop Balloon
function popBalloon(balloon) {
    confetti({
        particleCount: 50,
        spread: 60,
        origin: { 
            x: parseFloat(balloon.style.left) || 0.5, 
            y: 0.8 
        },
        colors: ['#ff6b9d', '#4ecdc4', '#f9ca24']
    });
    balloon.style.opacity = '0';
    balloon.style.transform = 'scale(0)';
    setTimeout(() => balloon.remove(), 500);
}

// 💃 Dance Party
function startDanceParty() {
    document.body.style.animation = 'none';
    
    // Dance floor lights
    const danceFloor = document.getElementById('danceFloor');
    danceFloor.style.animationDuration = '0.5s';
    
    // Dancing emojis
    const dancers = ['💃', '🕺', '🎉', '✨', '🎊', '🥳'];
    for(let i = 0; i < 20; i++) {
        setTimeout(() => {
            createDancer(dancers[Math.floor(Math.random() * dancers.length)]);
        }, i * 100);
    }
    
    // Music beat visualizer
    beatVisualizer();
}

// Create dancing emoji
function createDancer(emoji) {
    const dancer = document.createElement('div');
    dancer.innerHTML = emoji;
    dancer.style.cssText = `
        position: fixed;
        font-size: 2rem;
        left: ${Math.random() * 80 + 10}%;
        top: 50%;
        z-index: 20;
        pointer-events: none;
        animation: danceMove 1.5s ease-out forwards;
    `;
    document.body.appendChild(dancer);
    
    setTimeout(() => dancer.remove(), 1500);
}

// 🎆 Fireworks Show
function fireworksShow() {
    for(let i = 0; i < 15; i++) {
        setTimeout(() => {
            const colors = ['#ff6b9d', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b'];
            confetti({
                particleCount: 100,
                angle: 60 + i * 4,
                spread: 80,
                origin: { x: Math.random() * 0.4 + 0.3 },
                colors: [colors[i % colors.length]]
            });
            confetti({
                particleCount: 100,
                angle: 120 - i * 4,
                spread: 80,
                origin: { x: Math.random() * 0.4 + 0.6 },
                colors: [colors[i % colors.length]]
            });
        }, i * 200);
    }
}

// 🎁 Open Gifts
function openGifts() {
    const gifts = ['📱', '💐', '💍', '👗', '🎸', '✨'];
    const colors = ['#ff6b9d', '#4ecdc4', '#f9ca24', '#eb4d4b', '#45b7d1'];
    
    for(let i = 0; i < 12; i++) {
        setTimeout(() => {
            const gift = document.createElement('div');
            gift.className = 'gift-box';
            gift.innerHTML = gifts[Math.floor(Math.random() * gifts.length)];
            gift.style.cssText = `
                left: ${Math.random() * 80 + 10}%;
                top: ${Math.random() * 40 + 20}%;
                background: linear-gradient(45deg, ${colors[Math.floor(Math.random()*5)]}, #fff);
                border-radius: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2rem;
                border: 3px solid #fff;
            `;
            gift.onclick = () => gift.classList.add('open');
            document.body.appendChild(gift);
            
            setTimeout(() => {
                if(gift.parentNode) gift.classList.add('open');
            }, 2000);
        }, i * 300);
    }
}

// 🎵 Beat Visualizer
function beatVisualizer() {
    const beats = 16;
    for(let i = 0; i < beats; i++) {
        setTimeout(() => {
            createSparkleWave();
        }, i * 150);
    }
}

function createSparkleWave() {
    for(let i = 0; i < 15; i++) {
        setTimeout(() => {
            createSparkle(
                Math.random() * window.innerWidth,
                Math.random() * window.innerHeight / 2
            );
        }, i * 50);
    }
}

function createSparkle(x, y) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    sparkle.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 2000);
}

// 🚀 Ultimate Party Mode
function ultimateParty() {
    // Everything at once!
    startDanceParty();
    setTimeout(fireworksShow, 500);
    setTimeout(openGifts, 1000);
    
    // Screen shake
    document.body.style.animation = 'shake 0.5s ease-in-out';
    
    // Continuous balloons
    const balloonInterval = setInterval(() => {
        if(Math.random() < 0.3) {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.innerHTML = '🎈';
            balloon.style.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            balloon.onclick = () => popBalloon(balloon);
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 12000);
        }
    }, 1000);
    
    setTimeout(() => clearInterval(balloonInterval), 10000);
}

// CSS Animations
const style = document.createElement('style');
style.textContent = `
    @keyframes bounceIn {
        0% { opacity: 0; transform: scale(0.3); }
        50% { opacity: 1; transform: scale(1.05); }
        70% { transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
    }
    @keyframes danceMove {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-200px) rotate(360deg); opacity: 0; }
    }
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
`;
document.head.appendChild(style);

// Auto party start after 3 seconds
setTimeout(() => {
    confetti({
        particleCount: 100,
        spread: 120,
        origin: { y: 0.6 }
    });
}, 3000);
</script>

<!-- MUSIC (keep your original mp3) -->
<audio id="partyMusic" loop preload="auto">
    <source src="mp3.mp3">
</audio>

</body>
</html>
