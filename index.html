<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik </title>

<!-- FONT GOOGLE POPPINS + HANDWRITING -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    position: relative;
}

/* FOTO BACKGROUND ANDA */
.bg-image {
    background-image: url('5ea4d25c-04a4-48ae-ab60-e65c001a4e59.JPG');
    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    position: fixed;
    width: 100%;
    z-index: -2;
    filter: blur(2px);
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* CONTENT */
.content-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
    padding: 20px;
}

/* JUDUL HAPPY BIRTHDAY - STATIC */
h1.title {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,255,255,0.9);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeInDown 1s ease 0.3s forwards;
}

@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* NAMA - HANDWRITING BERHENTI DI SINI */
.name {
    font-size: clamp(3rem, 9vw, 5.5rem);
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    color: #fff;
    text-shadow: 
        0 0 20px rgba(255,255,255,0.9),
        0 0 30px rgba(103,126,234,0.6);
    margin: 1rem 0 2rem 0;
    overflow: hidden;
    white-space: nowrap;
    border-right: 4px solid rgba(255,255,255,0.9);
    width: 0;
    animation: handwriting 2.5s steps(25) 1.3s forwards;
}

@keyframes handwriting {
    from { width: 0; }
    to { width: 100%; }
}

/* MESSAGE CONTAINER - RAPiH */
.message-container {
    max-width: 600px;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeInUp 1s ease 4s forwards;
}

.message-title {
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 600;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    margin-bottom: 1rem;
    letter-spacing: 1px;
}

.message-text {
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: 300;
    line-height: 1.7;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 1px 5px rgba(0,0,0,0.5);
    padding: 1.5rem 2rem;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 
        0 10px 30px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
}

/* CAKE BUTTON */
.cake-btn {
    font-size: clamp(6rem, 16vw, 8rem);
    background: transparent;
    border: none;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.3);
    animation: 
        bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) 5.2s forwards;
    transition: all 0.4s ease;
    display: block;
    text-shadow: 
        0 0 20px rgba(255,255,255,0.8),
        0 10px 20px rgba(0,0,0,0.3);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
    line-height: 1;
    margin-bottom: 1rem;
}

@keyframes bounceIn {
    0% {
        opacity: 0;
        transform: scale(0.3) rotate(-180deg);
    }
    50% {
        opacity: 1;
        transform: scale(1.2) rotate(20deg);
    }
    70% {
        transform: scale(0.9) rotate(-10deg);
    }
    100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
    }
}

.cake-btn:hover {
    transform: scale(1.3) rotate(15deg);
    filter: drop-shadow(0 15px 30px rgba(255,215,0,0.6));
    animation: wiggle 0.5s ease-in-out;
}

@keyframes wiggle {
    0%, 100% { transform: scale(1.3) rotate(15deg); }
    25% { transform: scale(1.3) rotate(20deg); }
    75% { transform: scale(1.3) rotate(10deg); }
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 65px;
    height: 65px;
    font-size: 1.6rem;
    color: white;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: slideInRight 0.8s 0.8s forwards;
}

@keyframes slideInRight {
    to { opacity: 1; transform: translateX(0); }
}

.music-btn:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.4);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .content-container { padding: 15px;
