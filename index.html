<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik 💙</title>

<!-- FONT GOOGLE POPPINS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    position: relative;
}

/* FOTO BACKGROUND ANDA */
.bg-image {
    background-image: url('5ea4d25c-04a4-48ae-ab60-e65c001a4e59.JPG');
    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    position: fixed;
    width: 100%;
    z-index: -2;
    filter: blur(2px);
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* CONTENT */
.content-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
    padding: 20px;
}

/* JUDUL */
h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,255,255,0.9);
    margin-bottom: 1rem;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { 
        text-shadow: 
            0 0 20px rgba(255,255,255,0.8),
            0 0 30px rgba(255,255,255,0.6),
            0 0 40px rgba(103,126,234,0.5);
    }
    to { 
        text-shadow: 
            0 0 30px rgba(255,255,255,1),
            0 0 40px rgba(255,255,255,0.8),
            0 0 50px rgba(103,126,234,0.8);
    }
}

/* NAMA */
.name {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 600;
    color: #fff;
    text-shadow: 0 0 15px rgba(255,255,255,0.9);
    margin-bottom: 2rem;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-15px); }
    60% { transform: translateY(-8px); }
}

/* SUBTEXT */
.subtitle {
    font-size: clamp(1rem, 3vw, 1.5rem);
    margin-bottom: 3rem;
    opacity: 0.9;
    font-weight: 300;
    animation: fadeInUp 1s ease 0.5s both;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* CAKE BUTTON */
.cake-btn {
    font-size: clamp(4rem, 12vw, 6rem);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    border: 3px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    width: 160px;
    height: 160px;
    cursor: pointer;
    animation: pulse 2s infinite;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 
        0 15px 35px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.1);
}

.cake-btn:hover {
    transform: scale(1.25) rotate(360deg);
    background: rgba(255,255,255,0.4);
    box-shadow: 
        0 25px 50px rgba(0,0,0,0.4),
        0 0 50px rgba(255,255,255,0.3);
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 65px;
    height: 65px;
    font-size: 1.6rem;
    color: white;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

.music-btn:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.4);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ANIMASI */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .content-container { padding: 15px; }
    h1 { letter-spacing: 1px; }
    .cake-btn { width: 140px; height: 140px; }
    .music-btn { top: 15px; right: 15px; width: 55px; height: 55px; }
}
</style>
</head>

<body>
<!-- BACKGROUND FOTO -->
<div class="bg-image"></div>
<div class="overlay"></div>

<!-- MUSIC BUTTON -->
<button class="music-btn" id="musicBtn">🎵</button>

<!-- CONTENT -->
<div class="content-container">
    <h1>Happy Birthday</h1>
    <h1 class="name">Indah Nauli Damanik 💙</h1>
    <p class="subtitle">Semoga selalu bahagia, sehat, dan sukses! ✨</p>
    <button class="cake-btn" onclick="celebrate()">🎂</button>
    <p style="font-size: 0.9rem; opacity: 0.7; margin-top: 2rem;">Klik 🎂 untuk rayakan! 🎉</p>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop preload="auto">
    <source src="mp3.mp3">
</audio>

<!-- CONFETTI CDN -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// 🎵 MUSIC CONTROL
let isPlaying = false;
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');

function toggleMusic() {
    if (isPlaying) {
        bgMusic.pause();
        musicBtn.innerHTML = '🔇';
        isPlaying = false;
    } else {
        bgMusic.play().catch(() => {});
        musicBtn.innerHTML = '🎵';
        isPlaying = true;
    }
}

// 🎉 CELEBRATE FUNCTION
function celebrate() {
    // Play music
    if (!isPlaying) {
        bgMusic.play().catch(() => {});
        musicBtn.innerHTML = '🎵';
        isPlaying = true;
    }

    // 🎊 Confetti Explosion 1
    confetti({
        particleCount: 250,
        spread: 120,
        origin: { y: 0.6 }
    });

    // 🎊 Confetti dari kiri & kanan
    setTimeout(() => {
        confetti({
            particleCount: 200,
            angle: 60,
            spread: 90,
            origin: { x: 0, y: 0.4 }
        });
        confetti({
            particleCount: 200,
            angle: 120,
            spread: 90,
            origin: { x: 1, y: 0.4 }
        });
    }, 400);

    // 🎊 Final burst
    setTimeout(() => {
        confetti({
            particleCount: 300,
            spread: 180,
            origin: { y: 0.2 }
        });
    }, 1200);

    // Cake shake effect
    const cakeBtn = document.querySelector('.cake-btn');
    cakeBtn.style.animation = 'shake 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
}

// Shake animation
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
    @keyframes shake {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-8px) rotate(-2deg); }
        20%, 40%, 60%, 80% { transform: translateX(8px) rotate(2deg); }
    }
`;
document.head.appendChild(shakeStyle);

// Auto play setelah user interaction
document.addEventListener('click', function handleFirstClick() {
    if (!isPlaying) {
        bgMusic.play().catch(e => console.log('Audio ready'));
    }
    document.removeEventListener('click', handleFirstClick);
}, { once: true });
</script>

</body>
</html>
