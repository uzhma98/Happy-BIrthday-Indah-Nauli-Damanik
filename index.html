<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Indah Nauli Damanik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Mencegah scroll */
        }

        /* Background Foto Full Screen */
        .bg-image {
            /* GANTI NAMA FILE FOTO DI SINI */
            background-image: url('5ea4d25c-04a4-48ae-ab60-e65c001a4e59.jpg'); 
            
            height: 100%; 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: fixed;
            width: 100%;
            z-index: -1;
            /* Efek blur sedikit agar teks terbaca */
            filter: blur(2px); 
            transform: scale(1.1); /* Untuk menutupi pinggiran blur */
        }

        /* Overlay Gelap agar Teks Terbaca */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Hitam transparan */
            z-index: 0;
        }

        /* Konten Utama (Tanpa Kotak) */
        .content-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: white; /* Teks jadi putih */
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* Bayangan teks */
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 300px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Tombol Kue Beranimasi */
        .cake-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 4rem; /* Ukuran Ikon Kue */
            transition: transform 0.3s ease;
            /* Animasi Berdenyut */
            animation: pulse 1.5s infinite; 
        }

        .cake-btn:hover {
            transform: scale(1.2);
            animation: none; /* Berhenti berdenyut saat di-hover */
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Animasi Fade In untuk Teks */
        .fade-in {
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="overlay"></div>

   <div class="content-container fade-in">
        <h1>Happy Birthday, <br> Indah Nauli Damanik ✨</h1>
        <p>A special day for a special person</p>
        
        <button class="cake-btn" onclick="celebrate()">🎂</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="mp3.”mp3 type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Musik akan berputar otomatis setelah klik kue
        function celebrate() {
            // 1. Putar Musik
            const music = document.getElementById("bgMusic");
            music.play();
            
            // 2. Efek Konfeti Besar
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
