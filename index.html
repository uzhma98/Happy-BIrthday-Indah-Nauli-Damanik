<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik </title>

<!-- FONT GOOGLE POPPINS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100%;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    position: relative;
}

/* FOTO BACKGROUND ANDA */
.bg-image {
    background-image: url('5ea4d25c-04a4-48ae-ab60-e65c001a4e59.JPG');
    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    position: fixed;
    width: 100%;
    z-index: -2;
    filter: blur(2px);
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* CONTENT */
.content-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: white;
    padding: 20px;
}

/* JUDUL HANDWRITING */
.handwriting {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    font-family: 'Dancing Script', cursive;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,255,255,0.9);
    margin-bottom: 1rem;
    overflow: hidden;
    white-space: nowrap;
    border-right: 3px solid rgba(255,255,255,0.8);
    animation: handwriting 3s steps(40) forwards, blink 0.75s infinite;
}

@keyframes handwriting {
    from { width: 0; }
    to { width: 100%; }
}

@keyframes blink {
    0%, 50% { border-color: rgba(255,255,255,0.8); }
    51%, 100% { border-color: transparent; }
}

/* NAMA HANDWRITING */
.name {
    font-size: clamp(2.5rem, 7vw, 4.5rem) !important;
    font-family: 'Dancing Script', cursive !important;
    font-weight: 700 !important;
    color: #fff !important;
    text-shadow: 0 0 20px rgba(255,255,255,0.9);
    margin: 1rem 0 2rem 0;
    opacity: 0;
    animation: handwriting-name 3.5s steps(30) 3s forwards, fadeInUp 1s 4s forwards;
}

@keyframes handwriting-name {
    from { width: 0; }
    to { width: 100%; }
}

/* SUBTEXT */
.subtitle {
    font-size: clamp(1rem, 3vw, 1.5rem);
    margin-bottom: 3rem;
    opacity: 0;
    font-weight: 300;
    animation: fadeInUp 1s ease 5s forwards;
    line-height: 1.6;
}

/* CAKE BUTTON */
.cake-btn {
    font-size: clamp(4rem, 12vw, 6rem);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    border: 3px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    width: 160px;
    height: 160px;
    cursor: pointer;
    opacity: 0;
    transform: scale(0);
    animation: 
        popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) 6s forwards,
        pulse 2s infinite 6.8s;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 
        0 15px 35px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.1);
}

@keyframes popIn {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.cake-btn:hover {
    transform: scale(1.25) rotate(360deg);
    background: rgba(255,255,255,0.4);
    box-shadow: 
        0 25px 50px rgba(0,0,0,0.4),
        0 0 50px rgba(255,255,255,0.3);
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 65px;
    height: 65px;
    font-size: 1.6rem;
    color: white;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: slideInRight 1s 2s forwards;
}

@keyframes slideInRight {
    to { opacity: 1; transform: translateX(0); }
}

.music-btn:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.4);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ANIMASI PULSE */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .content-container { padding: 15px; }
    .handwriting, .name { letter-spacing: 1px !important; }
    .cake-btn { width: 140px; height: 140px; }
    .music-btn { top: 15px; right: 15px; width: 55px; height: 55px; }
}
</style>
</head>

<body>
<!-- BACKGROUND FOTO -->
<div class="bg-image"></div>
<div class="overlay"></div>

<!-- MUSIC BUTTON -->
<button class="music-btn" id="musicBtn">🎵</button>

<!-- CONTENT -->
<div class="content-container">
    <h1 class="handwriting">Happy Birthday</h1>
    <h1 class="name">Indah Nauli Damanik</h1>
    <p class="subtitle">Selamat ulang tahun ya, Makasih sudah sabar dan selalu ada di samping aku. yang penting kamu sehat dan bahagia terus. I'm so lucky to have you✨</p>
    <button class="cake-btn" onclick="celebrate()">🎂</button>
    <p style="font-size: 0.9rem; opacity: 0; animation: fadeInUp 1s 7s forwards;">Klik 🎂 untuk rayakan! 🎉</p>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop preload="auto">
    <source src="mp3.mp3">
</audio>

<!-- CONFETTI CDN -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- GOOGLE FONT HANDWRITING -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<script>
// 🎵 MUSIC CONTROL
let isPlaying = false;
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');

function toggleMusic() {
    if (isPlaying) {
        bgMusic.pause();
        musicBtn.innerHTML = '🔇';
        isPlaying = false;
    } else {
        bgMusic.play().catch(() => {});
        musicBtn.innerHTML = '🎵';
        isPlaying = true;
    }
}

// 🎉 CELEBRATE FUNCTION
function celebrate() {
    // Play music
    if (!isPlaying) {
        bgMusic.play().catch(() => {});
        musicBtn.innerHTML = '🎵';
        isPlaying = true;
    }

    // 🎊 Confetti Explosion 1
    confetti({
        particleCount: 250,
        spread: 120,
        origin: { y: 0.6 }
    });

    // 🎊 Confetti dari kiri & kanan
    setTimeout(() => {
        confetti({
            particleCount: 200,
            angle: 60,
            spread: 90,
            origin: { x: 0, y: 0.4 }
        });
        confetti({
            particleCount: 200,
            angle: 120,
            spread: 90,
            origin: { x: 1, y: 0.4 }
        });
    }, 400);

    // 🎊 Final burst + heart
    setTimeout(() => {
        confetti({
            particleCount: 300,
            spread: 180,
            origin: { y: 0.2 }
        });
        // Heart confetti
        setTimeout(() => {
            for(let i = 0; i < 10; i++) {
                setTimeout(() => {
                    confetti({
                        particleCount: 5,
                        angle: 90 + i*10,
                        spread: 20,
                        origin: { x: 0.5, y: 0.5 },
                        colors: ['#ff6b9d', '#ff8fab', '#ffb3c6']
                    });
                }, i * 200);
            }
        }, 200);
    }, 1200);

    // Cake shake + bounce
    const cakeBtn = document.querySelector('.cake-btn');
    cakeBtn.style.animation = 'shake 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
}

// Shake animation
const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
    @keyframes shake {
        0%, 100% { transform: translateX(0) rotate(0deg) scale(1); }
        10%, 30%, 50%, 70%, 90% { 
            transform: translateX(-10px) rotate(-3deg) scale(1.1); 
        }
        20%, 40%, 60%, 80% { 
            transform: translateX(10px) rotate(3deg) scale(1.1); 
        }
    }
`;
document.head.appendChild(shakeStyle);

// Auto play setelah user interaction
document.addEventListener('click', function handleFirstClick() {
    if (!isPlaying) {
        bgMusic.play().catch(e => console.log('Audio ready'));
    }
    document.removeEventListener('click', handleFirstClick);
}, { once: true });
</script>

</body>
</html>
