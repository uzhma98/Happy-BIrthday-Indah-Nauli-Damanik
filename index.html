<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik</title>

<!-- FONT IOSEVKA -->
<link href="https://iosevka-webfonts.github.io/iosevka/iosevka.css" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100%;
    font-family: 'Iosevka Web', monospace;
    overflow: hidden;
}

/* BACKGROUND FOTO */
.bg-image {
    /* GANTI FOTO DI SINI */
    background-image: url('5ea4d25c-04a4-48ae-ab60-e65c001a4e59.JPG');

    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    position: fixed;
    width: 100%;
    z-index: -1;
    filter: blur(3px);
    transform: scale(1.1);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* CONTENT */
.content-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    text-align: center;
    color: white;
    padding: 20px;
}

/* JUDUL */
h1 {
    font-size: clamp(36px, 6vw, 72px);
    letter-spacing: 5px;
    text-transform: uppercase;
    text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 20px rgba(255,255,255,0.5),
        0 0 40px rgba(255,255,255,0.3);
    margin-bottom: 20px;
}

/* TEXT */
p {
    font-size: 1.2rem;
    margin-bottom: 40px;
    opacity: 0.9;
}

/* BUTTON KUE */
.cake-btn {
    font-size: 4rem;
    background: none;
    border: none;
    cursor: pointer;
    animation: pulse 1.5s infinite;
    transition: 0.3s;
}

.cake-btn:hover {
    transform: scale(1.2);
    animation: none;
}

/* ANIMASI */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* TYPEWRITER EFFECT */
.typing {
    overflow: hidden;
    border-right: 2px solid white;
    white-space: nowrap;
    animation: typing 3s steps(30), blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}
</style>
</head>

<body>

<div class="bg-image"></div>
<div class="overlay"></div>

<div class="content-container">
    <h1 class="typing">Happy Birthday ✨</h1>
    <p>For Indah Nauli Damanik 💙</p>

    <button class="cake-btn" onclick="celebrate()">🎂</button>
</div>

<!-- MUSIK -->
<audio id="bgMusic" loop>
    <!-- GANTI MUSIK DI SINI -->
    <source src=“mp3.mp3" type="audio/mpeg">
</audio>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function celebrate() {
    // musik
    document.getElementById("bgMusic").play();

    // confetti
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    // efek tambahan
    setTimeout(() => {
        confetti({
            particleCount: 150,
            spread: 180,
            origin: { y: 0.3 }
        });
    }, 500);
}
</script>

</body>
</html>
