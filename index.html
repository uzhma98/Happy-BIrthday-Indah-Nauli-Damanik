<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Indah Nauli Damanik</title>

<link href="https://iosevka-webfonts.github.io/iosevka/iosevka.css" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    height: 100%;
    font-family: 'Iosevka Web', monospace;
    overflow: hidden;
    background: #0f172a;
}

.bg-image {
    background-image: url('5ea4d25c-04a4-48ae-ab60-e65c001a4e59.JPG');
    height: 100%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    position: fixed;
    width: 100%;
    z-index: -1;
    filter: blur(3px) brightness(0.6); /* Sedikit digelapkan agar teks putih kontras */
    transform: scale(1.1);
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
}

.content-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    text-align: center;
    color: white;
    padding: 20px;
}

/* PERBAIKAN TYPING */
.typing-container {
    display: inline-block;
}

.typing {
    font-size: clamp(30px, 6vw, 60px);
    letter-spacing: 5px;
    text-transform: uppercase;
    overflow: hidden;
    border-right: 3px solid white;
    white-space: nowrap;
    width: 0; /* Mulai dari nol */
    animation: typing 3s steps(30) forwards, blink 0.7s infinite;
    margin-bottom: 10px;
}

/* PERBAIKAN CLASS NAME */
.name {
    font-size: clamp(28px, 5vw, 50px);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 2s ease forwards;
    animation-delay: 3s; /* Muncul setelah typing selesai */
    
    /* Glow Biru */
    text-shadow:
        0 0 10px #38bdf8,
        0 0 20px #38bdf8,
        0 0 40px #0ea5e9;
    margin-bottom: 30px;
}

.cake-btn {
    font-size: 5rem;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
    animation-delay: 4.5s; /* Muncul paling terakhir */
}

.pulse { animation: pulse 1.5s infinite; }

@keyframes typing {
    from { width: 0 }
    to { width: 100% } /* Mengisi seluruh area teks */
}

@keyframes blink { 50% { border-color: transparent } }

@keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="bg-image"></div>
<div class="overlay"></div>

<div class="content-container">
    <div class="typing-container">
        <h1 class="typing">Happy Birthday ✨</h1>
    </div>
    <h1 class="name">Indah Nauli Damanik 💙</h1>

    <button class="cake-btn pulse" onclick="celebrate()">🎂</button>
</div>

<audio id="bgMusic" loop>
    <source src="mp3.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function celebrate() {
    // Putar musik
    const music = document.getElementById("bgMusic");
    music.play().catch(e => console.log("Audio play blocked"));

    // Confetti Pertama
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    // Confetti Kedua (setelah jeda)
    setTimeout(() => {
        confetti({
            particleCount: 150,
            spread: 180,
            origin: { y: 0.3 }
        });
    }, 500);
}
</script>

</body>
</html>
