<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Indah Nauli Damanik</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* BACKGROUND */
        .bg-image {
            background-image: url('bg.jpg');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: fixed;
            width: 100%;
            z-index: -2;
            filter: blur(2px);
            transform: scale(1.05);
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: -1;
        }

        /* CONTENT */
        .content-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: white;
            padding: 20px;
            transition: opacity 0.5s;
        }

        h1.title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.9);
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInDown 1s ease 0.3s forwards;
        }

        .name {
            font-size: clamp(3rem, 9vw, 5.5rem) !important;
            font-family: 'Dancing Script', cursive !important;
            color: #fff !important;
            margin-bottom: 1.5rem !important;
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid rgba(255,255,255,0.9);
            width: 0;
            animation: handwriting 3s steps(18) 1.3s forwards, blink 0.75s infinite 3.8s;
        }

        @keyframes handwriting { from { width: 0; } to { width: 100%; } }
        @keyframes blink { 0%, 50% { border-color: white; } 51%, 100% { border-color: transparent; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* MESSAGE */
        .message-title { font-size: clamp(1.4rem, 4vw, 2rem); margin-bottom: 0.8rem; opacity: 0; animation: fadeInUp 1s ease 4.3s forwards; }
        .message-text { font-size: clamp(1rem, 2.8vw, 1.3rem); margin-bottom: 2rem; opacity: 0; animation: fadeInUp 1s ease 4.5s forwards; font-weight: 300; }

        /* CAKE */
        .cake-container { position: relative; width: 180px; height: 120px; margin: 0 auto; display: block; cursor: pointer; }
        .cake-slice {
            position: absolute; width: 100%; height: 100%; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; opacity: 0;
            animation: cakeSliceAppear 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 5.3s forwards;
            transition: all 0.5s;
        }
        .cake-slice-1 { background: linear-gradient(145deg, #ff99cc, #ff1493); z-index: 3; }
        .cake-slice-2 { background: linear-gradient(145deg, #ff69b4, #ff6b9d); z-index: 2; animation-delay: 5.4s; }
        .cake-slice-3 { background: linear-gradient(145deg, #ffb3c6, #ff69b4); z-index: 1; animation-delay: 5.5s; }

        @keyframes cakeSliceAppear { from { opacity: 0; transform: scale(0.6) rotateY(-90deg); } to { opacity: 1; transform: scale(1) rotateY(0deg); } }

        /* PHOTO OVERLAY LOGIC (CSS ONLY) */
        .photo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: 0.5s;
        }

        #trigger-gallery:checked ~ .photo-overlay { opacity: 1; pointer-events: auto; }
        #trigger-gallery:checked ~ .content-container .cake-slice { animation: cakeSliceExplode 0.6s forwards !important; }

        @keyframes cakeSliceExplode { to { transform: scale(0) rotate(720deg); opacity: 0; } }

        .photo-card {
            background: white; padding: 15px 15px 30px; border-radius: 10px;
            text-align: center; width: 85%; max-width: 350px;
            transform: scale(0.7); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #trigger-gallery:checked ~ .photo-overlay .photo-card { transform: scale(1); }
        .photo-card img { width: 100%; border-radius: 5px; }
        .photo-caption { font-family: 'Dancing Script', cursive; color: #333; font-size: 1.5rem; margin: 15px 0; }
        
        .close-photo { 
            padding: 8px 20px; background: #ff6b9d; color: white; 
            border-radius: 20px; cursor: pointer; display: inline-block; 
        }

        /* MUSIC BTN */
        .music-btn {
            position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.2);
            border-radius: 50%; width: 55px; height: 55px; color: white;
            z-index: 100; cursor: pointer; border: none; font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <input type="checkbox" id="trigger-gallery" style="display: none;" onchange="if(this.checked) celebrate()">

    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

    <div class="content-container">
        <h1 class="title">🎉Happy Birthday🎉</h1>
        <h1 class="name">Indah Nauli Damanik</h1>
        
        <div class="message-container">
            <div class="message-title">Selamat ulang tahun ya! 🎉</div>
            <div class="message-text">
                Makasih sudah sabar dan selalu ada di samping aku.<br>
                Yang penting kamu sehat dan bahagia terus.<br>
                <strong>I'm so lucky to have you ✨</strong>
            </div>

            <label for="trigger-gallery" class="cake-container">
                <div class="cake-slice cake-slice-1">🎂</div>
                <div class="cake-slice cake-slice-2">🎂</div>
                <div class="cake-slice cake-slice-3">🎂</div>
            </label>
            <p style="font-size: 0.9rem; opacity: 0; animation: fadeInUp 1s 6.1s forwards;">Klik 🎂 untuk kejutan! 🎉</p>
        </div>
    </div>

    <div class="photo-overlay">
        <div class="photo-card">
            <img src="1.jpg" alt="Indah">
            <div class="photo-caption">Happy Birthday, Sayang! ❤️</div>
            <label for="trigger-gallery" class="close-photo">Tutup</label>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="mp3.mp3">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let isPlaying = false;
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.innerHTML = '🔇';
            } else {
                bgMusic.play();
                musicBtn.innerHTML = '🎵';
            }
            isPlaying = !isPlaying;
        }

        function celebrate() {
            if(!isPlaying) toggleMusic();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
